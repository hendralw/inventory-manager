<div class="dialog-container">
  <h2 class="dialog-title">Edit Item</h2>

  <div class="dialog-field">
    <label class="dialog-label">Item Name</label>
    <p class="dialog-item-name">{{ data.item }}</p>
  </div>

  <div class="dialog-field">
    <label class="dialog-label">New Location <span class="required">*</span></label>
    <input
      [(ngModel)]="newLocation"
      (keyup.enter)="save()"
      placeholder="Enter location name"
      class="dialog-input"
      [class.dialog-input-invalid]="saveTouched() && !newLocation.trim()"
      autofocus />
    @if (saveTouched() && !newLocation.trim()) {
      <span class="dialog-field-error">Location is required</span>
    }
  </div>

  <div class="dialog-actions">
    <button (click)="cancel()" class="btn btn-secondary">Cancel</button>
    <button (click)="save()" class="btn btn-primary">Save</button>
  </div>
</div>
